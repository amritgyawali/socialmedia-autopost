name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Lint web app
        run: npm run lint

      - name: Typecheck web app
        run: npm run typecheck

      - name: Build web app
        run: npm run build

  engine:
    name: Engine tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/engine
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run engine verification
        run: mvn --batch-mode --no-transfer-progress verify

  compose:
    name: Validate infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Render Compose configuration
        working-directory: infra
        env:
          ENGINE_IMAGE: ghcr.io/example/postpilot-engine@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          API_DOMAIN: api.example.com
          ACME_EMAIL: admin@example.com
          DB_NAME: postpilot
          DB_USER: postpilot
          DB_PASS: test-only
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config --quiet

      - name: Lint shell scripts
        working-directory: ${{ github.workspace }}
        run: shellcheck infra/scripts/*.sh scripts/*.sh
